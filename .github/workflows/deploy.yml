name: Deploy to AWS ECR and Update SageMaker

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: new-repo-movie
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          
        - name: Smart Update SageMaker Endpoint
          run: |
            TIME_STAMP=$(date +%Y%m%d%H%M%S)
            MODEL_NAME="hospital-AI-model-$TIME_STAMP"
            CONFIG_NAME="hospital-config-$TIME_STAMP"
            ENDPOINT_NAME="hospital-agent-endpoint"
            ROLE_ARN="arn:aws:iam::509157248732:role/Movies_IAM_Role"

            # 1. Model & Config Create karein (Ye har baar naya banna zaroori hai)
            aws sagemaker create-model --model-name $MODEL_NAME --primary-container Image=${{ steps.login-ecr.outputs.registry }}/new-repo-movie:latest --execution-role-arn $ROLE_ARN
            aws sagemaker create-endpoint-config --endpoint-config-name $CONFIG_NAME --production-variants "VariantName=AllTraffic,ModelName=$MODEL_NAME,InitialInstanceCount=1,InstanceType=ml.m5.large"

            # 2. Check Endpoint Status
            STATUS=$(aws sagemaker describe-endpoint --endpoint-name $ENDPOINT_NAME --query 'EndpointStatus' --output text 2>/dev/null || echo "NotFound")

            if [ "$STATUS" == "InService" ]; then
              echo "Endpoint is healthy. Updating to new version..."
              aws sagemaker update-endpoint --endpoint-name $ENDPOINT_NAME --endpoint-config-name $CONFIG_NAME
            
            elif [ "$STATUS" == "Failed" ]; then
              echo "CRITICAL: Last deployment failed. Re-creating once to fix status..."
              aws sagemaker delete-endpoint --endpoint-name $ENDPOINT_NAME
              aws sagemaker wait endpoint-deleted --endpoint-name $ENDPOINT_NAME
              aws sagemaker create-endpoint --endpoint-name $ENDPOINT_NAME --endpoint-config-name $CONFIG_NAME
            
            elif [ "$STATUS" == "Updating" ]; then
              echo "Endpoint is already updating. Waiting for it to finish..."
              aws sagemaker wait endpoint-in-service --endpoint-name $ENDPOINT_NAME
              aws sagemaker update-endpoint --endpoint-name $ENDPOINT_NAME --endpoint-config-name $CONFIG_NAME

            else
              echo "Endpoint not found. Creating first time..."
              aws sagemaker create-endpoint --endpoint-name $ENDPOINT_NAME --endpoint-config-name $CONFIG_NAME
            fi
