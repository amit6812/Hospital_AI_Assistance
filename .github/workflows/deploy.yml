name: Deploy Vitalis AI

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. FRONTEND DEPLOY TO S3
      - name: Deploy Frontend to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
        
          aws s3 cp frontend/index.html s3://hospital-handler-bucket/ --region eu-north-1

      # 2. BACKEND DEPLOY TO EC2
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Folder check and Auto-Clone logic
            if [ ! -d "/home/ubuntu/Hospital-AI-Assistance" ]; then
              cd /home/ubuntu
          
              git clone https://github.com/${{ github.repository }}.git Hospital-AI-Assistance
            fi
            
            cd /home/ubuntu/Hospital-AI-Assistance

            git pull origin main

            sudo apt update
            sudo apt install -y python3-pip gunicorn uvicorn
            pip3 install -r requirements.txt --break-system-packages
                
            # Gunicorn restart logic (Safe restart)
            sudo fuser -k 8000/tcp || true
            sleep 2
            
            # Gunicorn run command
            nohup gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --daemon --bind 0.0.0.0:8000 > gunicorn.log 2>&1 &