name: Deploy to AWS ECR and Update SageMaker

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: new-repo-movie
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # SageMaker Endpoint Update Logic
      - name: Update SageMaker Endpoint
        run: |
          # 1. New Model Name create  (With Unique timestamp to avoid conflicts)
          TIME_STAMP=$(date +%Y%m%d%H%M%S)
          MODEL_NAME="hospital-AI-model-$TIME_STAMP"
          CONFIG_NAME="hospital-config-$TIME_STAMP"
          
          # 2 Create Model
          aws sagemaker create-model \
            --model-name $MODEL_NAME \
            --primary-container Image=${{ steps.login-ecr.outputs.registry }}/new-repo-movie:latest \
            --execution-role-arn arn:aws:iam::509157248732:role/Movies_IAM_Role

          # 3. Create Endpoint Configuration
          aws sagemaker create-endpoint-config \
            --endpoint-config-name $CONFIG_NAME \
            --production-variants "VariantName=AllTraffic,ModelName=$MODEL_NAME,InitialInstanceCount=1,InstanceType=ml.m5.large"

          # 4.Update For Existing Endpoint 
            aws sagemaker update-endpoint\
            --endpoint-name hospital-agent-endpoint \
            --endpoint-config-name $CONFIG_NAME