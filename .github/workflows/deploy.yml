name: Deploy to AWS SageMaker

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Image
        run: |

          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/new-repo-movie:latest

          echo "Building Docker Image..."
          docker build -t $IMAGE_URI .

          echo "Pushing Image to ECR..."
          docker push $IMAGE_URI

      - name: Deploy SageMaker Endpoint
        run: |

          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/new-repo-movie:latest

          TIME=$(date +%s)

          MODEL_NAME="hospital-model-$TIME"
          CONFIG_NAME="hospital-config-$TIME"
          ENDPOINT_NAME="hospital-endpoint"

          echo "Checking if endpoint exists..."

          if aws sagemaker describe-endpoint --endpoint-name $ENDPOINT_NAME > /dev/null 2>&1; then
              echo "Deleting old endpoint..."
              aws sagemaker delete-endpoint --endpoint-name $ENDPOINT_NAME
              aws sagemaker wait endpoint-deleted --endpoint-name $ENDPOINT_NAME
          fi

          echo "Creating SageMaker Model..."

          aws sagemaker create-model \
            --model-name $MODEL_NAME \
            --primary-container Image=$IMAGE_URI,Environment="{ACCOUNT_SID=${{ secrets.ACCOUNT_SID }},AUTH_TOKEN=${{ secrets.AUTH_TOKEN }},TWILIO_NUMBER=${{ secrets.TWILIO_NUMBER }},MY_NUMBER=${{ secrets.MY_NUMBER }},BASE_URL=${{ secrets.BASE_URL }}}" \
            --execution-role-arn "${{ secrets.SAGEMAKER_ROLE }}"

          echo "Creating Endpoint Config..."

          aws sagemaker create-endpoint-config \
            --endpoint-config-name $CONFIG_NAME \
            --production-variants VariantName=AllTraffic,ModelName=$MODEL_NAME,InitialInstanceCount=1,InstanceType=ml.m5.large

          echo "Creating Endpoint..."

          aws sagemaker create-endpoint \
            --endpoint-name $ENDPOINT_NAME \
            --endpoint-config-name $CONFIG_NAME

          echo "Waiting for endpoint to be InService..."

          aws sagemaker wait endpoint-in-service --endpoint-name $ENDPOINT_NAME

          echo "Deployment Successful"


# GitHub Action Start
#       ↓
# Docker Build
#       ↓
# Push Image → ECR
#       ↓
# Delete Old Endpoint
#       ↓
# Create Model
#       ↓
# Create Endpoint Config
#       ↓
# Create Endpoint
#       ↓
# Wait → InService